services:
  postgres:
    image: postgres:16-alpine
    container_name: tenant-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenant_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenant_hub"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: tenant-hub-api
    command: sh -c "pnpm --filter @tenant-hub/api prisma generate && pnpm --filter @tenant-hub/api dev"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tenant_hub?schema=public
      JWT_SECRET: tenant-hub-docker-development-secret
      PLATFORM_ADMIN_PHONES: ${PLATFORM_ADMIN_PHONES:-}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules

  ops-web:
    build:
      context: .
      dockerfile: apps/ops-web/Dockerfile
      target: development
    container_name: tenant-hub-ops-web
    command: pnpm --filter @tenant-hub/ops-web dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/ops-web:/app/apps/ops-web
      - /app/apps/ops-web/node_modules

volumes:
  postgres_data:
