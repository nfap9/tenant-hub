services:
  postgres:
    image: postgres:16-alpine
    container_name: tenant-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tenant_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tenant_hub}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: tenant-hub-api
    command: sh -c "pnpm --filter @tenant-hub/api prisma generate && pnpm --filter @tenant-hub/api dev"
    environment:
      NODE_ENV: development
      PORT: ${PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tenant_hub}?schema=public
      JWT_SECRET: ${JWT_SECRET:-tenant-hub-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8081,http://localhost:19006}
      CHOKIDAR_USEPOLLING: "true"
      OTP_EXPIRES_IN_MINUTES: ${OTP_EXPIRES_IN_MINUTES:-5}
      BCRYPT_OTP_SALT_ROUNDS: ${BCRYPT_OTP_SALT_ROUNDS:-10}
      BCRYPT_PASSWORD_SALT_ROUNDS: ${BCRYPT_PASSWORD_SALT_ROUNDS:-12}
      INVITE_EXPIRES_IN_HOURS: ${INVITE_EXPIRES_IN_HOURS:-24}
      INVITE_EXPIRES_MAX_HOURS: ${INVITE_EXPIRES_MAX_HOURS:-168}

    ports:
      - "${PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-4000}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules

  ops-web:
    build:
      context: .
      dockerfile: apps/ops-web/Dockerfile
      target: development
    container_name: tenant-hub-ops-web
    command: pnpm --filter @tenant-hub/ops-web dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/ops-web:/app/apps/ops-web
      - /app/apps/ops-web/node_modules

volumes:
  postgres_data:
