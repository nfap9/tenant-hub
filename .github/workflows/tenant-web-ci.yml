name: Tenant Web CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/tenant-web/**'
      - '.github/workflows/tenant-web-ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'eslint.config.mjs'
  pull_request:
    branches: [main]
    paths:
      - 'apps/tenant-web/**'
      - '.github/workflows/tenant-web-ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'eslint.config.mjs'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint & Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Typecheck
        run: pnpm --filter @tenant-hub/tenant-web typecheck

      - name: Lint
        run: pnpm --filter @tenant-hub/tenant-web lint

      - name: Build
        run: pnpm --filter @tenant-hub/tenant-web build
