name: Release Check

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-checks:
    name: Root Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Lint (all)
        run: pnpm lint

      - name: Typecheck (all)
        run: pnpm typecheck

  api-checks:
    name: API Lint & Typecheck & Test
    runs-on: ubuntu-latest
    needs: root-checks
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tenant_hub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tenant_hub"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tenant_hub?schema=public
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Run Prisma Migrations
        working-directory: apps/api
        run: pnpm prisma migrate deploy

      - name: Typecheck
        run: pnpm --filter @tenant-hub/api typecheck

      - name: Lint
        run: pnpm --filter @tenant-hub/api lint

      - name: Test
        run: pnpm --filter @tenant-hub/api test

  ops-web-checks:
    name: Ops Web Lint & Typecheck & Build
    runs-on: ubuntu-latest
    needs: root-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Typecheck
        run: pnpm --filter @tenant-hub/ops-web typecheck

      - name: Lint
        run: pnpm --filter @tenant-hub/ops-web lint

      - name: Build
        run: pnpm --filter @tenant-hub/ops-web build

  miniprogram-checks:
    name: Miniprogram Build
    runs-on: ubuntu-latest
    needs: root-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Build Weapp
        run: pnpm --filter @tenant-hub/miniprogram build:weapp

      - name: Build H5
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:4000/api' }}
        run: pnpm --filter @tenant-hub/miniprogram build:h5
