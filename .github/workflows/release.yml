name: Release Check

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-checks:
    name: Root Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Lint (all)
        run: pnpm lint

      - name: Typecheck (all)
        run: pnpm typecheck

  api-checks:
    name: API Lint & Typecheck & Build
    runs-on: ubuntu-latest
    needs: root-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm --filter @tenant-hub/api typecheck

      - name: Lint
        run: pnpm --filter @tenant-hub/api lint

      - name: Build
        run: pnpm --filter @tenant-hub/api build

  ops-web-checks:
    name: Ops Web Lint & Typecheck & Build
    runs-on: ubuntu-latest
    needs: root-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Typecheck
        run: pnpm --filter @tenant-hub/ops-web typecheck

      - name: Lint
        run: pnpm --filter @tenant-hub/ops-web lint

      - name: Build
        run: pnpm --filter @tenant-hub/ops-web build

  miniprogram-checks:
    name: Miniprogram Build
    runs-on: ubuntu-latest
    needs: root-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Build Weapp
        run: pnpm --filter @tenant-hub/miniprogram build:weapp

      - name: Build H5
        env:
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:4000/api' }}
        run: pnpm --filter @tenant-hub/miniprogram build:h5
