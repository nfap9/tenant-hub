# ============================================
# 2C2G 服务器 (Jenkins Master) Nginx 反向代理配置
#
# 作用: 作为统一流量入口，将请求转发到 4C8G 应用服务器
# 路径: /etc/nginx/sites-available/tenant-hub (Ubuntu)
#       或 /etc/nginx/conf.d/tenant-hub.conf (CentOS)
#
# 安装步骤:
#   1. 替换 __UPSTREAM_IP__ 为 4C8G 服务器的实际 IP（内网优先）
#   2. 替换 __DOMAIN__ 为实际域名
#   3. 替换 __CERT_PATH__ / __KEY_PATH__ 为 SSL 证书路径
#   4. sudo nginx -t && sudo systemctl reload nginx
# ============================================

# 上游服务器定义（4C8G 应用服务器）
upstream tenant_hub_api {
    # 建议使用 4C8G 的内网 IP，如: server 192.168.1.100:4000;
    # 如果没有内网互通，可使用公网 IP 并配合防火墙白名单
    server __UPSTREAM_IP__:4000;
    keepalive 32;
}

upstream tenant_hub_ops_web {
    server __UPSTREAM_IP__:3000;
    keepalive 32;
}

upstream tenant_hub_miniprogram_h5 {
    server __UPSTREAM_IP__:8080;
    keepalive 32;
}

# HTTP 80 端口：ACME 证书验证 + 强制 HTTPS 跳转
server {
    listen 80;
    server_name __DOMAIN__;

    # Let's Encrypt ACME 挑战路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 443 端口：主站（运营端 + API）
server {
    listen 443 ssl http2;
    server_name __DOMAIN__;

    # SSL 证书（由 Certbot 管理）
    ssl_certificate __CERT_PATH__;
    ssl_certificate_key __KEY_PATH__;

    # SSL 安全加固
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 日志
    access_log /var/log/nginx/tenant-hub-access.log;
    error_log /var/log/nginx/tenant-hub-error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 运营端前端（Ops Web）
    location / {
        proxy_pass http://tenant_hub_ops_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://tenant_hub_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # 健康检查（直接透传到 API）
    location /health {
        proxy_pass http://tenant_hub_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # 小程序 H5 预览版
    location /mp/ {
        proxy_pass http://tenant_hub_miniprogram_h5/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# 小程序独立域名配置（可选）
# 如果有 mp.example.com 子域名，可取消注释以下 server 块
