<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载 Tenant Hub App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .download-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .version-info {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #888;
        }
        .version-info span {
            color: #333;
            font-weight: 500;
        }
        .qr-section {
            margin-top: 24px;
        }
        .qr-hint {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
        }
        #qrcode {
            display: inline-block;
            padding: 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .notice {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }
        @media (max-width: 480px) {
            .container {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TH</div>
        <h1>Tenant Hub</h1>
        <p class="subtitle">轻量化公寓管理系统</p>

        <a id="downloadLink" href="#" class="download-btn">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            下载 Android 安装包
        </a>

        <div class="version-info">
            当前版本：<span id="version">--</span> &nbsp;|&nbsp; 更新日期：<span id="date">--</span>
        </div>

        <div class="qr-section">
            <p class="qr-hint">手机扫码直接下载</p>
            <div id="qrcode"></div>
        </div>

        <p class="notice">
            Android 8.0 及以上版本安装时可能需要允许「安装未知来源应用」权限。
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // 自动获取 /apk/ 目录下最新的 .apk 文件
        async function init() {
            try {
                const res = await fetch('./apk/');
                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                const apkLinks = links
                    .map(a => a.href)
                    .filter(href => href.endsWith('.apk'))
                    .sort().reverse();

                if (apkLinks.length === 0) {
                    document.getElementById('version').textContent = '暂无安装包';
                    document.getElementById('downloadLink').style.opacity = '0.5';
                    document.getElementById('downloadLink').style.pointerEvents = 'none';
                    return;
                }

                const latest = apkLinks[0];
                const filename = latest.split('/').pop();

                // 解析版本号，例如 tenant-hub-1.2.3.apk → 1.2.3
                const versionMatch = filename.match(/[\d]+\.[\d]+\.[\d]+/);
                const version = versionMatch ? versionMatch[0] : filename;

                document.getElementById('downloadLink').href = latest;
                document.getElementById('version').textContent = version;

                // 尝试从文件列表获取修改日期
                const row = links.find(a => a.href === latest)?.closest('tr');
                if (row) {
                    const dateCell = row.querySelector('td:nth-child(3)');
                    if (dateCell) {
                        document.getElementById('date').textContent = dateCell.textContent.trim();
                    }
                }

                // 生成二维码
                new QRCode(document.getElementById('qrcode'), {
                    text: window.location.origin + latest,
                    width: 160,
                    height: 160,
                    colorDark: '#1a1a2e',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch (e) {
                console.error('初始化失败:', e);
                document.getElementById('version').textContent = '加载失败';
            }
        }

        init();
    </script>
</body>
</html>
